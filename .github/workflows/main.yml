name: MLOps End-to-End CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: 4. Check Formatting (black)
        run: |
          black --check src

      - name: 5. Linting (flake8)
        run: |
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: "6. Pipeline: Ingestion Stage"
        run: |
          python src/mlProject/pipeline/stage_01_data_ingestion.py

      - name: "7. Pipeline: Validation Stage"
        run: |
          python src/mlProject/pipeline/stage_02_data_validation.py

      - name: "8. Pipeline: Transformation Stage"
        run: |
          python src/mlProject/pipeline/stage_03_data_transformation.py

      - name: 9. Unit Testing (pytest)
        run: |
          pytest tests/

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    # Chỉ chạy CD khi push vào main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 4. Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mlop-churn:latest
