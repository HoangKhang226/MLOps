formatter:
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    formatter: simple
    level: INFO
  
  file_handler:
    class: logging.FileHandler
    formatter: simple
    level: INFO
    filename: logs/app.log
    
root:
  handlers: [console, file]
  level: INFO