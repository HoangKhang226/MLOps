# ==============================================================================
# PROJECT CONFIGURATION: Cấu hình đường dẫn cho toàn bộ Pipeline
# ==============================================================================

# Thư mục gốc chứa toàn bộ kết quả đầu ra (mô hình, dữ liệu trung gian)
artifacts_root: artifacts

# DATA INGESTION: Tải và giải nén dữ liệu
data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://www.kaggle.com/datasets/blastchar/telco-customer-churn
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion
  raw_data_dir: data/raw # Nơi lưu trữ bản gốc sạch để DVC track

# DATA VALIDATION: Kiểm tra cấu trúc dữ liệu (Schema)
data_validation:
  root_dir: artifacts/data_validation
  unzipped_data_dir: artifacts/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv
  STATUS_FILE: artifacts/data_validation/status.txt # Lưu kết quả kiểm tra (True/False)
  schema_file: schema.yaml # File định nghĩa tên cột & kiểu dữ liệu

# DATA TRANSFORMATION: Tiền xử lý & Chia tập dữ liệu
data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv
  processed_dir: data/processed # Lưu train.csv và test.csv để dùng lâu dài
  test_size: 0.2 # Tỷ lệ chia tập test
  oversampling: true # Sử dụng SMOTE để cân bằng dữ liệu huấn luyện

# MODEL TRAINER: Huấn luyện mô hình
model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train.csv
  test_data_path: artifacts/data_transformation/test.csv
  model_name: model.joblib # Tên file mô hình sau khi train xong
  mlflow_uri: http://localhost:5000 

# MODEL EVALUATION: Đánh giá hiệu suất mô hình
model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json # Lưu RMSE, MAE, R2...
  mlflow_uri: http://localhost:5000 # Hoặc đường dẫn localhost cho MLflow
